<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erasmus+ Reflection — Deutsche Schule Prag</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
:root{
 --ink:#0f0e0c;
 --ink-light:#6f6c64;
 --paper:#f7f5ef;
 --white:#ffffff;
 --gold:#c09a3a;
 --gold-pale:#f5edd8;
 --rule:rgba(15,14,12,.08);
 --sans:'DM Sans',sans-serif;
 --mono:'DM Mono',monospace;
 --serif:'Playfair Display',serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
 font-family:var(--sans);
 background:var(--paper);
 color:var(--ink);
}

.container{
 max-width:720px;
 margin:auto;
}

.header{
 background:var(--ink);
 padding:36px 24px 32px;
 position:relative;
 overflow:hidden;
}

.header-eyebrow{
 font-family:var(--mono);
 font-size:9px;
 letter-spacing:.18em;
 text-transform:uppercase;
 color:var(--gold);
 margin-bottom:12px;
}

.header h1{
 font-family:var(--serif);
 font-size:28px;
 font-style:italic;
 color:var(--white);
 margin-bottom:12px;
}

.header p{
 font-size:13px;
 color:rgba(255,255,255,.6);
 line-height:1.6;
 max-width:360px;
}

.header-ghost{
 position:absolute;
 right:-18px;
 top:-12px;
 font-family:var(--serif);
 font-size:130px;
 font-style:italic;
 color:rgba(255,255,255,.03);
}

.block{
 background:var(--white);
 border-bottom:1px solid var(--rule);
 padding:26px 24px;
}

label{
 display:block;
 font-weight:500;
 font-size:16px;
 margin-bottom:6px;
}

.hint{
 font-size:12px;
 color:var(--ink-light);
 font-style:italic;
 margin-bottom:12px;
}

textarea,input{
 width:100%;
 padding:12px;
 border:1px solid var(--rule);
 background:var(--paper);
 font-family:var(--sans);
 font-size:15px;
}

textarea:focus,input:focus{
 outline:none;
 border-color:var(--gold);
 box-shadow:0 0 0 3px rgba(192,154,58,.12);
}

.consent{
 background:var(--gold-pale);
 border-left:3px solid var(--gold);
 padding:18px 24px;
 font-size:13px;
 display:flex;
 gap:10px;
}

.submit{
 padding:24px;
}

button{
 width:100%;
 padding:16px;
 border:none;
 background:var(--ink);
 color:var(--white);
 text-transform:uppercase;
 font-size:14px;
 cursor:pointer;
}

.thankyou{
 display:none;
 padding:60px 24px;
 text-align:center;
}

.thankyou h2{
 font-family:var(--serif);
 font-style:italic;
 font-size:26px;
 margin-bottom:12px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="header-ghost">Your words.</div>
<div class="header-eyebrow">Erasmus+ · DSP</div>
<h1>Tell us what you saw.</h1>
<p>Your reflections help colleagues understand what mobility really looks like in practice.</p>
</div>

<form action="https://formspree.io/f/xnjgekbe" method="POST">

<div class="block">
<label>Which mobility did you take part in?</label>
<div class="hint">e.g. exchange visit with a partner school in Helsinki, 2025</div>
<input type="text" name="mobility">
</div>

<div class="block">
<label>What moment with students stayed with you most?</label>
<textarea name="moment" required></textarea>
</div>

<div class="block">
<label>What would you say to a colleague unsure about proposing a mobility? (one sentence)</label>
<textarea name="advice" required></textarea>
</div>

<div class="block">
<label>What surprised you in a difficult way — and how did it resolve?</label>
<div class="hint">Small challenges are often the most useful to hear about.</div>
<textarea name="difficulty"></textarea>
</div>

<div class="block">
<label>Your name or initials</label>
<div class="hint">Initials are completely fine.</div>
<input type="text" name="name">
</div>

<input type="hidden" name="_subject" value="New Erasmus Reflection">
<input type="hidden" name="_next" value="https://justinsteinmetz.github.io/thankyou.html">

<div class="consent">
<input type="checkbox" required>
<label>I’m happy for my reflection to be used in internal Erasmus materials.</label>
</div>

<div class="submit">
<button type="submit">Send reflection</button>
</div>

</form>

</div>

</body>
</html>
