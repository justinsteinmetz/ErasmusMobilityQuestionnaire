<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erasmus+ Reflection — DSP</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
:root{
 --ink:#0f0e0c;
 --ink-light:#6f6c64;
 --paper:#f7f5ef;
 --white:#ffffff;
 --gold:#c09a3a;
 --gold-pale:#f5edd8;
 --rule:rgba(15,14,12,.08);
 --sans:'DM Sans',sans-serif;
 --mono:'DM Mono',monospace;
 --serif:'Playfair Display',serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{font-family:var(--sans);background:var(--paper);color:var(--ink);}

.container{max-width:720px;margin:auto;}

.header{
 background:var(--ink);
 padding:36px 24px 32px;
 position:relative;
}

.header-eyebrow{
 font-family:var(--mono);
 font-size:9px;
 letter-spacing:.18em;
 text-transform:uppercase;
 color:var(--gold);
 margin-bottom:12px;
}

.header h1{
 font-family:var(--serif);
 font-size:28px;
 font-style:italic;
 color:var(--white);
 margin-bottom:12px;
}

.header p{
 font-size:13px;
 color:rgba(255,255,255,.6);
 max-width:420px;
}

.block{
 background:var(--white);
 border-bottom:1px solid var(--rule);
 padding:26px 24px;
}

label{
 font-weight:500;
 font-size:16px;
 margin-bottom:6px;
 display:block;
}

.hint{
 font-size:12px;
 color:var(--ink-light);
 font-style:italic;
 margin-bottom:12px;
}

textarea,input{
 width:100%;
 padding:12px;
 border:1px solid var(--rule);
 background:var(--paper);
 font-size:15px;
}

textarea:focus,input:focus{
 outline:none;
 border-color:var(--gold);
 box-shadow:0 0 0 3px rgba(192,154,58,.12);
}

.consent{
 background:var(--gold-pale);
 border-left:3px solid var(--gold);
 padding:18px 24px;
 font-size:13px;
 display:flex;
 gap:10px;
}

.submit{padding:24px;}

button{
 width:100%;
 padding:16px;
 border:none;
 background:var(--ink);
 color:var(--white);
 text-transform:uppercase;
 cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<div class="header-eyebrow">Erasmus+ · DSP</div>
<h1>What actually happened?</h1>
<p>Write one or two moments you noticed — especially the ones you didn’t expect.</p>
</div>

<form action="https://formspree.io/f/xnjgekbe" method="POST">

<div class="block">
<label>Where did you go, and with which students?</label>
<input type="text" name="mobility">
</div>

<div class="block">
<label>Describe one moment with students that stayed with you.</label>
<div class="hint">Something small is often the most revealing.</div>
<textarea name="moment" required></textarea>
</div>

<div class="block">
<label>What would you say to a colleague unsure about proposing a mobility?</label>
<textarea name="advice" required></textarea>
</div>

<div class="block">
<label>What was harder than you expected?</label>
<div class="hint">And what actually helped in the moment.</div>
<textarea name="difficulty"></textarea>
</div>

<div class="block">
<label>Your name or initials</label>
<input type="text" name="name">
</div>

<input type="hidden" name="_subject" value="New Erasmus Reflection">
<input type="hidden" name="_next" value="thankyou.html">

<div class="consent">
<input type="checkbox" required>
<label>I’m happy for this to be used in Erasmus materials.</label>
</div>

<div class="submit">
<button type="submit">Send reflection</button>
</div>

</form>

</div>
</body>
</html>
